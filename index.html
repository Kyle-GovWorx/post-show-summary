<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Post-Show Summary Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
  :root{
    --bg:#F7F6F2;
    --surface:#FFFFFF;
    --border:#D4D1CA;
    --text:#28251D;
    --muted:#7A7974;
    --primary:#01696F;
    --primary-hover:#0C4E54;
    --accent-soft:#E6F0F1;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Inter',system-ui,-apple-system,Segoe UI,sans-serif;font-size:15px;line-height:1.5}
  .wrap{max-width:920px;margin:0 auto;padding:32px 24px 96px}
  header.page-head{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;margin-bottom:24px;flex-wrap:wrap}
  header.page-head h1{font-size:30px;font-weight:700;margin:0;letter-spacing:-0.01em}
  header.page-head p{margin:4px 0 0;color:var(--muted);font-size:14px}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap}
  button{font-family:inherit;font-size:14px;font-weight:600;border-radius:8px;padding:10px 16px;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--text);transition:all .15s ease}
  button:hover{border-color:var(--text)}
  button.primary{background:var(--primary);border-color:var(--primary);color:#fff}
  button.primary:hover{background:var(--primary-hover);border-color:var(--primary-hover)}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:20px}
  .card h2{font-size:18px;font-weight:600;margin:0 0 16px;padding-bottom:10px;border-bottom:1px solid var(--border)}
  .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}
  .grid.cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}
  .field{display:flex;flex-direction:column;gap:6px}
  .field.full{grid-column:1/-1}
  label{font-size:13px;font-weight:500;color:var(--text)}
  label .hint{display:block;color:var(--muted);font-weight:400;font-size:12px;margin-top:2px}
  input[type=text],input[type=date],input[type=number],input[type=url],textarea,select{
    width:100%;font:inherit;color:var(--text);background:#fff;border:1px solid var(--border);border-radius:8px;padding:10px 12px;transition:border-color .15s ease,box-shadow .15s ease
  }
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--accent-soft)}
  textarea{min-height:96px;resize:vertical;line-height:1.5}
  textarea.tall{min-height:140px}
  .ratings{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}
  .rating-row{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:#fff;gap:12px}
  .rating-row .lbl{font-size:14px;font-weight:500}
  .stars{display:flex;gap:4px}
  .star{font-size:22px;line-height:1;color:#D4D1CA;cursor:pointer;user-select:none;transition:color .1s ease}
  .star.on{color:#D19900}
  .recommend{display:flex;gap:8px}
  .recommend label{display:flex;align-items:center;gap:6px;padding:8px 12px;border:1px solid var(--border);border-radius:8px;cursor:pointer;font-weight:500}
  .recommend input{accent-color:var(--primary)}
  .footnote{color:var(--muted);font-size:12px;margin-top:8px}

  @media (max-width:680px){
    .grid,.grid.cols-3,.ratings{grid-template-columns:1fr}
    .wrap{padding:20px 14px 80px}
  }
</style>
</head>
<body>

<div class="wrap">
  <header class="page-head">
    <div>
      <h1>Post-Show Summary Report</h1>
      <p>Fill out the form, then export a clean PDF copy for the team.</p>
    </div>
    <div class="toolbar">
      <button type="button" id="clearBtn">Clear form</button>
      <button type="button" id="pdfBtn" class="primary">Export as PDF</button>
    </div>
  </header>

  <form id="reportForm" autocomplete="off">

    <!-- Conference Details -->
    <section class="card">
      <h2>Conference Details</h2>
      <div class="grid">
        <div class="field full">
          <label for="submittedBy">Submitted by
            <span class="hint">GovWorx AE or rep filling out this form</span>
          </label>
          <input type="text" id="submittedBy" name="submittedBy" placeholder="Your name" />
        </div>
        <div class="field full">
          <label for="conferenceName">Conference name</label>
          <input type="text" id="conferenceName" name="conferenceName" />
        </div>
        <div class="field">
          <label for="startDate">Start date</label>
          <input type="date" id="startDate" name="startDate" />
        </div>
        <div class="field">
          <label for="endDate">End date</label>
          <input type="date" id="endDate" name="endDate" />
        </div>
        <div class="field">
          <label for="location">Location</label>
          <input type="text" id="location" name="location" placeholder="City, State" />
        </div>
        <div class="field">
          <label for="website">Conference website</label>
          <input type="url" id="website" name="website" placeholder="https://" />
        </div>
        <div class="field full">
          <label for="staffAttending">Staff attending</label>
          <input type="text" id="staffAttending" name="staffAttending" placeholder="Comma-separated names" />
        </div>
        <div class="field">
          <label for="showCost">Show cost (USD)</label>
          <input type="number" id="showCost" name="showCost" min="0" step="0.01" placeholder="0.00" />
        </div>
      </div>
    </section>

    <!-- Show Details -->
    <section class="card">
      <h2>Show Details</h2>
      <div class="grid cols-3">
        <div class="field">
          <label for="numLeads">Number of leads
            <span class="hint">List specifics in Leads Notes below</span>
          </label>
          <input type="number" id="numLeads" name="numLeads" min="0" />
        </div>
        <div class="field">
          <label for="numCustomers">Number of customers
            <span class="hint">List specifics in Customers Notes below</span>
          </label>
          <input type="number" id="numCustomers" name="numCustomers" min="0" />
        </div>
        <div class="field">
          <label for="boothVisitors">Approximate booth visitors</label>
          <input type="number" id="boothVisitors" name="boothVisitors" min="0" />
        </div>
        <div class="field">
          <label for="demosCompleted">Demos completed</label>
          <input type="number" id="demosCompleted" name="demosCompleted" min="0" />
        </div>
        <div class="field" style="grid-column:span 2">
          <label for="competitors">Competitors that attended</label>
          <input type="text" id="competitors" name="competitors" />
        </div>
        <div class="field full">
          <label for="mainProductInterest">Main product interest indicated at the show</label>
          <textarea id="mainProductInterest" name="mainProductInterest"></textarea>
        </div>
        <div class="field full">
          <label for="competitiveIssues">Competitive issues or industry rumors</label>
          <textarea id="competitiveIssues" name="competitiveIssues"></textarea>
        </div>
        <div class="field full">
          <label for="boothCondition">Condition of booth, graphics, supplies
            <span class="hint">Anything needing replaced?</span>
          </label>
          <textarea id="boothCondition" name="boothCondition"></textarea>
        </div>
      </div>
    </section>

    <!-- Marketing -->
    <section class="card">
      <h2>Marketing</h2>
      <div class="grid">
        <div class="field full">
          <label for="newsRelease">Information for a news release
            <span class="hint">People at the show, main issues discussed, unique events or opportunities, etc.</span>
          </label>
          <textarea id="newsRelease" name="newsRelease" class="tall"></textarea>
        </div>
      </div>
    </section>

    <!-- Notes & Recap -->
    <section class="card">
      <h2>Notes &amp; Recap</h2>
      <div class="grid">
        <div class="field">
          <label for="raffleWinner">Raffle winner</label>
          <input type="text" id="raffleWinner" name="raffleWinner" />
        </div>
        <div class="field">
          <label for="agencies">Agencies</label>
          <input type="text" id="agencies" name="agencies" />
        </div>
        <div class="field full">
          <label for="leadsNotes">Leads notes</label>
          <textarea id="leadsNotes" name="leadsNotes" class="tall"></textarea>
        </div>
        <div class="field full">
          <label for="customersNotes">Customers notes</label>
          <textarea id="customersNotes" name="customersNotes" class="tall"></textarea>
        </div>
        <div class="field full">
          <label for="showNotes">Show notes</label>
          <textarea id="showNotes" name="showNotes" class="tall"></textarea>
        </div>
        <div class="field full">
          <label for="showRecap">Show recap</label>
          <textarea id="showRecap" name="showRecap" class="tall"></textarea>
        </div>
      </div>
    </section>

    <!-- Ratings -->
    <section class="card">
      <h2>Ratings</h2>
      <div class="ratings">
        <div class="rating-row">
          <span class="lbl">Overall</span>
          <div class="stars" data-target="overallRating" role="radiogroup" aria-label="Overall rating"></div>
          <input type="hidden" name="overallRating" id="overallRating" value="0" />
        </div>
        <div class="rating-row">
          <span class="lbl">Leads</span>
          <div class="stars" data-target="leadsRating" role="radiogroup" aria-label="Leads rating"></div>
          <input type="hidden" name="leadsRating" id="leadsRating" value="0" />
        </div>
        <div class="rating-row">
          <span class="lbl">Customer contact</span>
          <div class="stars" data-target="customerRating" role="radiogroup" aria-label="Customer contact rating"></div>
          <input type="hidden" name="customerRating" id="customerRating" value="0" />
        </div>
        <div class="rating-row">
          <span class="lbl">Recommend next year?</span>
          <div class="recommend">
            <label><input type="radio" name="recommend" value="Yes" /> Yes</label>
            <label><input type="radio" name="recommend" value="No" /> No</label>
            <label><input type="radio" name="recommend" value="Maybe" /> Maybe</label>
          </div>
        </div>
      </div>
      <p class="footnote">Ratings are 1-5. Click a star to set, click the same star again to clear.</p>
    </section>

  </form>
</div>

<script>
(function(){
  // Build star widgets
  document.querySelectorAll('.stars').forEach(group => {
    const target = group.dataset.target;
    for(let i=1;i<=5;i++){
      const s = document.createElement('span');
      s.className = 'star';
      s.textContent = '\u2605';
      s.dataset.value = i;
      s.setAttribute('role','radio');
      s.setAttribute('aria-label', i + ' star' + (i>1?'s':''));
      s.addEventListener('click', () => setRating(target, i));
      group.appendChild(s);
    }
  });

  function setRating(targetId, value){
    const hidden = document.getElementById(targetId);
    const current = parseInt(hidden.value,10) || 0;
    const next = current === value ? 0 : value;
    hidden.value = next;
    const stars = document.querySelector('.stars[data-target="'+targetId+'"]').children;
    for(let i=0;i<stars.length;i++){
      stars[i].classList.toggle('on', (i+1) <= next);
    }
  }

  // --- helpers ---------------------------------------------------------------
  function formatDate(d){
    if(!d) return '';
    const parts = d.split('-');
    if(parts.length !== 3) return d;
    return parts[1]+'/'+parts[2]+'/'+parts[0];
  }
  function dateRange(a,b){
    if(a && b) return formatDate(a)+' \u2013 '+formatDate(b);
    return formatDate(a) || formatDate(b) || '';
  }
  function money(v){
    if(v===''||v==null) return '';
    const n = Number(v); if(isNaN(n)) return v;
    return '$'+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  }
  function ratingNumber(n){
    n = parseInt(n,10)||0;
    return n ? (n + ' / 5') : 'Not rated';
  }
  // Draw 5 star polygons inside a PDF cell at a given baseline
  function drawStarsInCell(doc, n, x, y, size){
    n = parseInt(n,10)||0;
    const C_STAR = [209, 153, 0];
    const C_EMPTY = [210, 207, 200];
    const gap = size * 0.4;
    for(let i = 0; i < 5; i++){
      const cx = x + (size/2) + i * (size + gap);
      const filled = i < n;
      const color = filled ? C_STAR : C_EMPTY;
      // 5-point star polygon
      const pts = [];
      for(let k = 0; k < 10; k++){
        const r = (k % 2 === 0) ? size/2 : size/4.5;
        const ang = -Math.PI/2 + (k * Math.PI / 5);
        pts.push([cx + Math.cos(ang)*r, y + Math.sin(ang)*r]);
      }
      doc.setFillColor(...color);
      doc.setDrawColor(...color);
      const lines = [];
      for(let k = 1; k < pts.length; k++){
        lines.push([pts[k][0]-pts[k-1][0], pts[k][1]-pts[k-1][1]]);
      }
      doc.lines(lines, pts[0][0], pts[0][1], [1,1], 'F', true);
    }
  }
  function val(id){ const el = document.getElementById(id); return el ? el.value.trim() : ''; }
  function radio(name){
    const r = document.querySelector('input[name="'+name+'"]:checked');
    return r ? r.value : '';
  }

  // --- PDF generation via jsPDF + autoTable ---------------------------------
  function generatePdf(){
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit:'pt', format:'letter', orientation:'portrait' });

    const PAGE_W = doc.internal.pageSize.getWidth();   // 612pt
    const PAGE_H = doc.internal.pageSize.getHeight();  // 792pt
    const MARGIN_X = 48;
    const MARGIN_TOP = 56;
    const MARGIN_BOTTOM = 56;
    const CONTENT_W = PAGE_W - (MARGIN_X * 2);

    // Colors
    const C_PRIMARY = [1, 105, 111];     // #01696F
    const C_TEXT    = [40, 37, 29];      // #28251D
    const C_MUTED   = [122, 121, 116];   // #7A7974
    const C_RULE    = [212, 209, 202];   // #D4D1CA
    const C_KEY_BG  = [247, 246, 242];   // #F7F6F2
    const C_PLACEHOLDER = [186, 185, 180];
    const C_STAR    = [209, 153, 0];     // #D19900

    // Header
    const confName = val('conferenceName') || 'Untitled Conference';
    const dates = dateRange(val('startDate'), val('endDate'));
    const today = new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});

    doc.setFont('helvetica','bold');
    doc.setFontSize(22);
    doc.setTextColor(...C_PRIMARY);
    doc.text('Post-Show Summary Report', MARGIN_X, MARGIN_TOP);

    doc.setFont('helvetica','normal');
    doc.setFontSize(10);
    doc.setTextColor(...C_MUTED);
    const subParts = [confName];
    if(dates) subParts.push(dates);
    subParts.push('Generated ' + today);
    doc.text(subParts.join('  \u00b7  '), MARGIN_X, MARGIN_TOP + 18);

    // Thin rule under header
    doc.setDrawColor(...C_RULE);
    doc.setLineWidth(0.5);
    doc.line(MARGIN_X, MARGIN_TOP + 28, PAGE_W - MARGIN_X, MARGIN_TOP + 28);

    let cursorY = MARGIN_TOP + 48;

    // Section renderer using autoTable
    function renderSection(title, rows, opts){
      opts = opts || {};
      // Section heading — reserve room so it never lands as a widow at the bottom
      const headingSpace = 38;
      if(cursorY + headingSpace + 40 > PAGE_H - MARGIN_BOTTOM){
        doc.addPage();
        cursorY = MARGIN_TOP;
      }

      doc.setFont('helvetica','bold');
      doc.setFontSize(13);
      doc.setTextColor(...C_PRIMARY);
      doc.text(title, MARGIN_X, cursorY);
      doc.setDrawColor(...C_RULE);
      doc.setLineWidth(0.4);
      doc.line(MARGIN_X, cursorY + 6, PAGE_W - MARGIN_X, cursorY + 6);
      cursorY += 14;

      const body = rows.map(([k,v]) => {
        const isEmpty = !v || v === '';
        return [
          { content: k, styles: { fontStyle:'bold', textColor: C_TEXT, fillColor: C_KEY_BG } },
          { content: isEmpty ? '\u2014' : String(v), styles: { textColor: isEmpty ? C_PLACEHOLDER : C_TEXT } }
        ];
      });

      doc.autoTable({
        startY: cursorY,
        margin: { left: MARGIN_X, right: MARGIN_X, top: MARGIN_TOP, bottom: MARGIN_BOTTOM },
        tableWidth: CONTENT_W,
        body,
        theme: 'grid',
        styles: {
          font: 'helvetica',
          fontSize: 10,
          cellPadding: { top:7, right:9, bottom:7, left:9 },
          lineColor: C_RULE,
          lineWidth: 0.4,
          valign: 'top',
          overflow: 'linebreak'
        },
        columnStyles: {
          0: { cellWidth: CONTENT_W * 0.34 },
          1: { cellWidth: CONTENT_W * 0.66 }
        },
        rowPageBreak: 'auto',  // split long-text rows cleanly across pages instead of orphaning whitespace
        didDrawCell: opts.didDrawCell
      });

      cursorY = doc.lastAutoTable.finalY + 18;
    }

    // --- Conference Details ---
    renderSection('Conference Details', [
      ['Submitted by',      val('submittedBy')],
      ['Conference name',   val('conferenceName')],
      ['Dates',             dates],
      ['Location',          val('location')],
      ['Staff attending',   val('staffAttending')],
      ['Conference website',val('website')],
      ['Show cost',         money(val('showCost'))]
    ]);

    // --- Show Details ---
    renderSection('Show Details', [
      ['Number of leads',                     val('numLeads')],
      ['Number of customers',                 val('numCustomers')],
      ['Approximate booth visitors',          val('boothVisitors')],
      ['Demos completed',                     val('demosCompleted')],
      ['Competitors that attended',           val('competitors')],
      ['Main product interest',               val('mainProductInterest')],
      ['Competitive issues / industry rumors',val('competitiveIssues')],
      ['Condition of booth, graphics, supplies', val('boothCondition')]
    ]);

    // --- Marketing ---
    renderSection('Marketing', [
      ['News release information', val('newsRelease')]
    ]);

    // --- Notes ---
    renderSection('Notes', [
      ['Raffle winner',   val('raffleWinner')],
      ['Agencies',        val('agencies')],
      ['Leads notes',     val('leadsNotes')],
      ['Customers notes', val('customersNotes')],
      ['Show notes',      val('showNotes')],
      ['Show recap',      val('showRecap')]
    ]);

    // --- Ratings --- (custom drawing for star glyphs in color)
    const ratingRows = [
      ['Overall rating',          val('overallRating')],
      ['Leads rating',            val('leadsRating')],
      ['Customer contact rating', val('customerRating')],
      ['Recommend attending next year', radio('recommend')]
    ];

    // Heading
    if(cursorY + 40 > PAGE_H - MARGIN_BOTTOM){ doc.addPage(); cursorY = MARGIN_TOP; }
    doc.setFont('helvetica','bold');
    doc.setFontSize(13);
    doc.setTextColor(...C_PRIMARY);
    doc.text('Ratings', MARGIN_X, cursorY);
    doc.setDrawColor(...C_RULE);
    doc.setLineWidth(0.4);
    doc.line(MARGIN_X, cursorY + 6, PAGE_W - MARGIN_X, cursorY + 6);
    cursorY += 14;

    doc.autoTable({
      startY: cursorY,
      margin: { left: MARGIN_X, right: MARGIN_X, top: MARGIN_TOP, bottom: MARGIN_BOTTOM },
      tableWidth: CONTENT_W,
      body: ratingRows.map(([label, v], idx) => {
        const isRating = idx < 3;
        const isEmpty = !v || (isRating && (parseInt(v,10)||0) === 0);
        let display = '';
        if(isRating){
          // Star icons + number text are drawn via didDrawCell. Keep content blank.
          display = isEmpty ? 'Not rated' : '';
        } else {
          display = isEmpty ? '\u2014' : String(v);
        }
        return [
          { content: label, styles: { fontStyle:'bold', textColor: C_TEXT, fillColor: C_KEY_BG } },
          {
            content: display,
            _rating: isRating ? (parseInt(v,10)||0) : null,
            styles: {
              textColor: isEmpty ? C_PLACEHOLDER : C_TEXT,
              fontStyle: 'normal'
            }
          }
        ];
      }),
      theme: 'grid',
      styles: {
        font: 'helvetica',
        fontSize: 10,
        cellPadding: { top:8, right:9, bottom:8, left:9 },
        lineColor: C_RULE,
        lineWidth: 0.4,
        valign: 'middle',
        overflow: 'linebreak'
      },
      columnStyles: {
        0: { cellWidth: CONTENT_W * 0.34 },
        1: { cellWidth: CONTENT_W * 0.66 }
      },
      rowPageBreak: 'avoid',
      didDrawCell: function(data){
        // Draw star icons + number text inside the value column for rating rows
        if(data.section !== 'body' || data.column.index !== 1) return;
        const cell = data.cell;
        const raw = cell.raw;
        if(!raw || raw._rating == null) return;
        const n = raw._rating;
        if(n === 0) return; // 'Not rated' text label already drawn by autoTable
        const starSize = 10;
        const starX = cell.x + 9;
        const starY = cell.y + cell.height/2;
        drawStarsInCell(doc, n, starX, starY, starSize);
        // Number text positioned to the right of all 5 stars
        const totalStarsWidth = 5 * starSize + 4 * (starSize * 0.4);
        const numX = starX + totalStarsWidth + 10;
        doc.setFont('helvetica','bold');
        doc.setFontSize(10);
        doc.setTextColor(40,37,29);
        doc.text(n + ' / 5', numX, starY + 3);
      }
    });

    // Footer with page numbers
    const pageCount = doc.internal.getNumberOfPages();
    for(let p = 1; p <= pageCount; p++){
      doc.setPage(p);
      doc.setFont('helvetica','normal');
      doc.setFontSize(9);
      doc.setTextColor(...C_MUTED);
      doc.text('Post-Show Summary  \u00b7  ' + confName, MARGIN_X, PAGE_H - 24);
      const right = 'Page ' + p + ' of ' + pageCount;
      const rw = doc.getTextWidth(right);
      doc.text(right, PAGE_W - MARGIN_X - rw, PAGE_H - 24);
    }

    const safeName = (confName || 'Post-Show-Summary').replace(/[^a-z0-9-_ ]/gi,'').replace(/\s+/g,'-') || 'Post-Show-Summary';
    doc.save(safeName + '.pdf');
  }

  document.getElementById('pdfBtn').addEventListener('click', () => {
    const btn = document.getElementById('pdfBtn');
    const orig = btn.textContent;
    btn.disabled = true; btn.textContent = 'Building PDF...';
    // Defer one frame so the disabled state paints before the synchronous PDF work
    requestAnimationFrame(() => {
      try { generatePdf(); }
      catch(e){ console.error(e); alert('Sorry, the PDF export failed. ' + e.message); }
      finally { btn.disabled = false; btn.textContent = orig; }
    });
  });

  document.getElementById('clearBtn').addEventListener('click', () => {
    if(!confirm('Clear all fields?')) return;
    document.getElementById('reportForm').reset();
    document.querySelectorAll('input[type=hidden]').forEach(h => h.value = '0');
    document.querySelectorAll('.star.on').forEach(s => s.classList.remove('on'));
  });
})();
</script>
</body>
</html>
